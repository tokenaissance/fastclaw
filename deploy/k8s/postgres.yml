# 可选 — 集群内自托管 Postgres,适合开发 / 单机验证。
# 生产强烈建议用云厂商托管 PG(阿里云 RDS / AWS RDS),把 fastclaw.yaml 里
# fastclaw-secrets.STORAGE_DSN 指过去即可,不需要本文件。
#
# 配合 fastclaw.yaml 使用时:
#   1. kubectl apply -f postgres.yml  (创建本文件的资源)
#   2. 修改 fastclaw.yaml 的 fastclaw-secrets.STORAGE_DSN 为:
#        postgres://fastclaw:<上面 POSTGRES_PASSWORD>@fastclaw-db:5432/fastclaw?sslmode=disable
#   3. kubectl apply -f fastclaw.yaml
apiVersion: v1
kind: Secret
metadata:
  name: fastclaw-db
  namespace: fastclaw
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-me-in-production"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fastclaw-db
  namespace: fastclaw
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastclaw-db
  namespace: fastclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastclaw-db
  template:
    metadata:
      labels:
        app: fastclaw-db
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: fastclaw
        - name: POSTGRES_USER
          value: fastclaw
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fastclaw-db
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "fastclaw"]
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: fastclaw-db
---
apiVersion: v1
kind: Service
metadata:
  name: fastclaw-db
  namespace: fastclaw
spec:
  selector:
    app: fastclaw-db
  ports:
  - port: 5432
